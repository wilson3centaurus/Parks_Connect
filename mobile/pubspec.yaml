name: parks_connect
description: Hybrid Parks Connect mobile app for tourists and field staff.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  http_parser: ^4.0.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0
  geolocator: ^12.0.0
  image_picker: ^1.1.2
  connectivity_plus: ^6.0.3
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/logo.png
